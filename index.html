<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Omar Abdul | Portfolio</title>

<style>
body {
  margin: 0;
  font-family: "Georgia", serif;
  background: linear-gradient(180deg, #f8fafc, #eef2ff);
  color: #111827;
  line-height: 1.7;
}

/* PROGRESS BAR */
#progressBar {
  position: fixed;
  top: 0;
  left: 0;
  height: 4px;
  width: 0%;
  background: linear-gradient(90deg, #fbbf24, #1e3a8a);
  z-index: 9999;
}

/* HEADER */
header {
  padding: 80px 20px 40px;
  text-align: center;
  background: linear-gradient(135deg, #0f172a, #1e3a8a);
  color: white;
  border-radius: 0 0 25px 25px;
}

header img {
  width: 120px;
  height: 120px;
  border-radius: 50%;
  border: 3px solid #fbbf24;
}

/* TYPING */
h1 {
  font-size: 40px;
  border-right: 3px solid #fbbf24;
  white-space: nowrap;
  overflow: hidden;
  width: 0;
  margin: 10px auto;
  animation: typing 2.5s steps(20,end) forwards, blink 0.7s infinite;
}

.subtitle {
  color: #cbd5e1;
}

/* NAV */
nav {
  display: flex;
  justify-content: center;
  gap: 25px;
  padding: 15px;
  background: white;
  position: sticky;
  top: 0;
  box-shadow: 0 5px 20px rgba(0,0,0,0.1);
}

nav a {
  text-decoration: none;
  color: #1e3a8a;
  font-weight: bold;
}

/* SECTIONS */
section {
  max-width: 850px;
  margin: auto;
  padding: 60px 20px;
}

h2 {
  border-left: 4px solid #fbbf24;
  padding-left: 10px;
  color: #1e3a8a;
}

/* ===== PROJECT CARDS ===== */
.projects {
  display: grid;
  gap: 15px;
}

.card {
  background: white;
  padding: 18px;
  border-radius: 12px;
  box-shadow: 0 8px 20px rgba(0,0,0,0.08);
  cursor: pointer;
  transition: 0.3s;
}

.card:hover {
  transform: translateY(-6px) scale(1.02);
  box-shadow: 0 20px 40px rgba(0,0,0,0.15);
}

/* MODAL */
.modal {
  display: none;
  position: fixed;
  top: 0;
  left: 0;
  width: 100%;
  height: 100%;
  background: rgba(0,0,0,0.6);
  justify-content: center;
  align-items: center;
}

.modal-content {
  background: white;
  padding: 25px;
  border-radius: 15px;
  width: 80%;
  max-width: 500px;
  animation: pop 0.3s ease;
}

.close {
  float: right;
  cursor: pointer;
  font-size: 20px;
}

/* CONTACT */
.contact {
  background: #0f172a;
  color: white;
  padding: 20px;
  border-radius: 12px;
}

/* ANIM */
@keyframes typing {
  from { width: 0; }
  to { width: 100%; }
}

@keyframes blink {
  50% { border-color: transparent; }
}

@keyframes pop {
  from { transform: scale(0.8); opacity: 0; }
  to { transform: scale(1); opacity: 1; }
}
</style>
</head>

<body>

<div id="progressBar"></div>

<header>
  <img src="https://via.placeholder.com/120">
  <h1>Omar Abdul</h1>
  <div class="subtitle">Engineering Student — Arts et Métiers</div>
</header>

<nav>
  <a href="#about">About</a>
  <a href="#projects">Projects</a>
  <a href="#contact">Contact</a>
</nav>

<section id="about">
<h2>About</h2>
<p>Engineering student focused on physics and mechanical systems.</p>
</section>

<section id="projects">
<h2>Projects (click me)</h2>

<div class="projects">

<div class="card" onclick="openModal('Heat Sink Optimization', 'Study of thermal dissipation using simulation and experiments. Result: +11°C efficiency gain.')">
Heat Sink Optimization (TIPE)
</div>

<div class="card" onclick="openModal('Mechanical Randomness', 'Study of deterministic systems creating the illusion of randomness using physics models.')">
Mechanical Randomness Study
</div>

</div>
</section>

<section id="contact">
<h2>Contact</h2>
<div class="contact">omar.abdul@ensam.eu</div>
</section>

<!-- MODAL -->
<div class="modal" id="modal">
  <div class="modal-content">
    <span class="close" onclick="closeModal()">✖</span>
    <h3 id="modalTitle"></h3>
    <p id="modalText"></p>
  </div>
</div>

<script>

/* PROGRESS BAR */
window.addEventListener("scroll", () => {
  const scrollTop = document.documentElement.scrollTop;
  const scrollHeight = document.documentElement.scrollHeight - document.documentElement.clientHeight;
  document.getElementById("progressBar").style.width =
    (scrollTop / scrollHeight) * 100 + "%";
});

/* MODAL */
function openModal(title, text) {
  document.getElementById("modal").style.display = "flex";
  document.getElementById("modalTitle").innerText = title;
  document.getElementById("modalText").innerText = text;
}

function closeModal() {
  document.getElementById("modal").style.display = "none";
}

/* CLOSE OUTSIDE CLICK */
window.onclick = function(e) {
  if (e.target.id === "modal") closeModal();
}

</script>

</body>
</html>
