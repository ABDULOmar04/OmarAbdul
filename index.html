<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Omar Abdul | Portfolio</title>

<style>
body {
  margin: 0;
  font-family: "Georgia", serif;
  background: linear-gradient(180deg, #f8fafc, #eef2ff);
  color: #111827;
  overflow-x: hidden;
}

/* ================= PROGRESS BAR ================= */
#progressBar {
  position: fixed;
  top: 0;
  left: 0;
  height: 4px;
  width: 0%;
  background: linear-gradient(90deg, #fbbf24, #1e3a8a);
  z-index: 9999;
}

/* ================= HEADER ================= */
header {
  text-align: center;
  padding: 90px 20px 40px;
  background: linear-gradient(135deg, #0f172a, #1e3a8a);
  color: white;
  border-radius: 0 0 25px 25px;
}

/* typing */
h1 {
  font-size: 40px;
  border-right: 3px solid #fbbf24;
  white-space: nowrap;
  overflow: hidden;
  width: 0;
  margin: auto;
  animation: typing 2.5s steps(20,end) forwards, blink 0.7s infinite;
}

.subtitle {
  color: #cbd5e1;
}

/* ================= NAV ================= */
nav {
  display: flex;
  justify-content: center;
  gap: 25px;
  padding: 15px;
  background: white;
  position: sticky;
  top: 0;
  box-shadow: 0 5px 20px rgba(0,0,0,0.1);
}

nav a {
  text-decoration: none;
  color: #1e3a8a;
  font-weight: bold;
}

/* ================= SECTIONS (SCROLL REVEAL) ================= */
section {
  max-width: 900px;
  margin: auto;
  padding: 80px 20px;

  opacity: 0;
  transform: translateY(60px);
  transition: all 0.8s ease;
}

section.show {
  opacity: 1;
  transform: translateY(0);
}

/* ================= TITLES ================= */
h2 {
  border-left: 5px solid #fbbf24;
  padding-left: 10px;
  color: #1e3a8a;
}

/* ================= PROJECT CARDS ================= */
.projects {
  display: grid;
  gap: 20px;
}

.card {
  background: white;
  padding: 20px;
  border-radius: 16px;
  cursor: pointer;
  box-shadow: 0 10px 25px rgba(0,0,0,0.1);
  transition: all 0.4s ease;
  transform-style: preserve-3d;
}

.card:hover {
  transform: translateY(-10px) rotateX(6deg) rotateY(-6deg) scale(1.03);
  box-shadow: 0 25px 50px rgba(0,0,0,0.2);
  border-left: 5px solid #fbbf24;
}

/* ================= MODAL ================= */
.modal {
  display: none;
  position: fixed;
  inset: 0;
  background: rgba(0,0,0,0.6);
  justify-content: center;
  align-items: center;
}

.modal-content {
  background: white;
  padding: 25px;
  border-radius: 15px;
  width: 80%;
  max-width: 500px;
  animation: pop 0.3s ease;
}

.close {
  float: right;
  cursor: pointer;
  font-size: 20px;
}

/* ================= CONTACT ================= */
.contact {
  background: #0f172a;
  color: white;
  padding: 20px;
  border-radius: 12px;
}

/* ================= ANIMATIONS ================= */
@keyframes typing {
  from { width: 0; }
  to { width: 100%; }
}

@keyframes blink {
  50% { border-color: transparent; }
}

@keyframes pop {
  from { transform: scale(0.8); opacity: 0; }
  to { transform: scale(1); opacity: 1; }
}
</style>
</head>

<body>

<div id="progressBar"></div>

<header>
  <h1>Omar Abdul</h1>
  <div class="subtitle">Engineering Student — Arts et Métiers</div>
</header>

<nav>
  <a href="#about">About</a>
  <a href="#projects">Projects</a>
  <a href="#contact">Contact</a>
</nav>

<section id="about">
<h2>About</h2>
<p>Engineering student focused on physics and mechanical systems.</p>
</section>

<section id="projects">
<h2>Projects (click cards)</h2>

<div class="projects">

<div class="card" onclick="openModal('Heat Sink Optimization', 'Thermal simulation + experiments. Result: 11.3°C improvement.')">
Heat Sink Optimization (TIPE)
</div>

<div class="card" onclick="openModal('Mechanical Randomness', 'Study of deterministic systems that behave like randomness.')">
Mechanical Randomness Study
</div>

</div>
</section>

<section id="contact">
<h2>Contact</h2>
<div class="contact">omar.abdul@ensam.eu</div>
</section>

<!-- MODAL -->
<div class="modal" id="modal">
  <div class="modal-content">
    <span class="close" onclick="closeModal()">✖</span>
    <h3 id="title"></h3>
    <p id="text"></p>
  </div>
</div>

<script>

/* ================= SCROLL PROGRESS ================= */
window.addEventListener("scroll", () => {
  const scrollTop = document.documentElement.scrollTop;
  const scrollHeight = document.documentElement.scrollHeight - window.innerHeight;

  document.getElementById("progressBar").style.width =
    (scrollTop / scrollHeight) * 100 + "%";
});

/* ================= SCROLL REVEAL ================= */
const sections = document.querySelectorAll("section");

window.addEventListener("scroll", () => {
  sections.forEach(sec => {
    const top = sec.getBoundingClientRect().top;
    if (top < window.innerHeight - 100) {
      sec.classList.add("show");
    }
  });
});

/* ================= MODAL ================= */
function openModal(title, text) {
  document.getElementById("modal").style.display = "flex";
  document.getElementById("title").innerText = title;
  document.getElementById("text").innerText = text;
}

function closeModal() {
  document.getElementById("modal").style.display = "none";
}

window.onclick = e => {
  if (e.target.id === "modal") closeModal();
};

</script>

</body>
</html>
